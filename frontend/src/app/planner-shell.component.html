<div class="planner-layout">

  <!-- Sidebar navigation -->
  <aside class="planner-sidebar">

    <button class="sb-item" [class.active]="section() === 'goals'" (click)="nav('goals')">
      <mat-icon>flag</mat-icon><span>Goals</span>
    </button>

    <div class="sb-divider"></div>
    <div class="sb-group-label">Planning</div>

    <button class="sb-item" [class.active]="section() === 'returns'" (click)="nav('returns')">
      <mat-icon>analytics</mat-icon><span>Returns</span>
    </button>
    <button class="sb-item" [class.active]="section() === 'cashflows'" (click)="nav('cashflows')">
      <mat-icon>account_balance_wallet</mat-icon><span>Cash Flows</span>
    </button>

    <div class="sb-divider"></div>
    <div class="sb-group-label">Assets</div>

    <button class="sb-item sb-sub" [class.active]="section() === 'realEstate'" (click)="nav('realEstate')">
      <mat-icon>home</mat-icon><span>Real Estate</span>
    </button>
    <button class="sb-item sb-sub" [class.active]="section() === 'domEquity'" (click)="nav('domEquity')">
      <mat-icon>trending_up</mat-icon><span>Indian Equity</span>
    </button>
    <button class="sb-item sb-sub" [class.active]="section() === 'usEquity'" (click)="nav('usEquity')">
      <mat-icon>public</mat-icon><span>US Equity</span>
    </button>
    <button class="sb-item sb-sub" [class.active]="section() === 'debt'" (click)="nav('debt')">
      <mat-icon>account_balance</mat-icon><span>Debt</span>
    </button>
    <button class="sb-item sb-sub" [class.active]="section() === 'gold'" (click)="nav('gold')">
      <mat-icon>stars</mat-icon><span>Gold</span>
    </button>
    <button class="sb-item sb-sub" [class.active]="section() === 'crypto'" (click)="nav('crypto')">
      <mat-icon>currency_bitcoin</mat-icon><span>Crypto</span>
    </button>
    <button class="sb-item sb-sub" [class.active]="section() === 'misc'" (click)="nav('misc')">
      <mat-icon>more_horiz</mat-icon><span>Other</span>
    </button>

    <div class="sb-divider"></div>

    <button class="sb-item" [class.active]="section() === 'networth'" (click)="nav('networth')">
      <mat-icon>pie_chart</mat-icon><span>Net Worth</span>
    </button>

  </aside>

  <!-- Content panel -->
  <main class="planner-content">
    @switch (section()) {
      @case ('goals')     { <app-financial-goals /> }
      @case ('returns')   { <app-returns-assumption /> }
      @case ('cashflows') { <app-cash-flows /> }
      @case ('networth')  { <app-net-worth /> }
      @case ('realEstate'){ <app-real-estate /> }
      @case ('domEquity') { <app-domestic-equity /> }
      @case ('usEquity')  { <app-us-equity /> }
      @case ('debt')      { <app-debt /> }
      @case ('gold')      { <app-gold /> }
      @case ('crypto')    { <app-crypto /> }
      @case ('misc')      { <app-miscellaneous /> }
    }
  </main>

</div>
